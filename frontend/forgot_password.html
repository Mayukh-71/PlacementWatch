<!DOCTYPE html>
<html>

<head>
    <title>Forgot Password</title>
    <link rel="stylesheet"
          href="style.css">
</head>

<body>

<h1>Forgot Password</h1>

<input
type="email"
id="emailInput"
placeholder="Enter Email">

<br><br>

<button
type="button"
onclick="sendResetOTP()">
Send OTP
</button>

<br><br>

<input
type="text"
id="otpInput"
placeholder="Enter OTP">

<br><br>

<input
type="password"
id="newPasswordInput"
placeholder="New Password">

<br><br>

<button
type="button"
onclick="resetPassword()">
Reset Password
</button>

<script src="script.js"></script>

</body>

</html>

<!DOCTYPE html>

    <title>Register</title>

<h1>Register</h1>

<input
type="email"
id="emailInput"
placeholder="Email">

type="password"

type="text"
id="otpInput"

type="button"
onclick="verifyAndRegister()">
Verify & Register
</button>

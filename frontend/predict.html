<!DOCTYPE html>
<html>

<head>
    <title>AI Placement Predictor</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
    <div class="nav-left">
        <a href="index.html">Home</a>
        <a href="submit.html">Submit</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="predict.html">AI Predictor</a>
    </div>

    <div id="authSection"></div>
</div>

<h1>AI Placement Predictor</h1>

<div class="predict-box">

    <input
    type="number"
    id="cgpaPredict"
    placeholder="CGPA">

    <br><br>

    <input
    type="text"
    id="departmentPredict"
    placeholder="Department">

    <br><br>

    <input
    type="text"
    id="rolePredict"
    placeholder="Role">

    <br><br>

    <input
    type="number"
    id="difficultyPredict"
    placeholder="Difficulty (1-10)">

    <br><br>

    <input
    type="number"
    id="yearPredict"
    placeholder="Year">

    <br><br>

    <button
    onclick="predictCTC()">
    Predict CTC
    </button>

</div>

<br>

<h2 id="predictionResult"></h2>
<div
id="companyPredictionResult">
</div>
<script src="script.js"></script>

</body>

</html>
